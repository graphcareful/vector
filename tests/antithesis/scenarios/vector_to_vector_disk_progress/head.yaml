data_dir: /var/lib/vector

sources:
  in:
    type: http_server
    address: 0.0.0.0:8080
    decoding:
      codec: json
    # No e2e acks: the source returns 200 once the event enters the pipeline,
    # not after it reaches the oracle. Data loss under faults is acceptable.
    acknowledgements:
      enabled: false

  metrics:
    type: internal_metrics
    scrape_interval_secs: 1

sinks:
  # Deliver straight to the oracle. A second Vector hop (tail) adds nothing to the
  # oversized-drop property being checked: the drop happens in this sink's disk
  # buffer, and delivery is observed at the oracle. The constrained buffer here is
  # the subject under test.
  out:
    type: http
    inputs: [in]
    uri: http://oracle:8686/ingest
    method: post
    encoding:
      codec: json
    # Each event maps to one disk record. This makes the 768KiB payload class a
    # deliberate oversized-record test rather than an accidental oversized batch.
    batch:
      max_events: 1
    buffer:
      type: disk
      max_size: 8388608 # 8MiB (4 data files), small enough that a stalled reader fills it and blocks
      when_full: block
    acknowledgements:
      enabled: false
    # Tuned for Antithesis fault testing. Vector's default 60s request timeout means a send stuck
    # on a connection broken by a network partition is not abandoned -- and so not retried against
    # the healed network -- for up to 60s. A short request timeout plus a short (but non-zero)
    # retry backoff keeps delivery making progress after faults clear within a few seconds.
    request:
      timeout_secs: 5
      retry_max_duration_secs: 1

  prom:
    type: prometheus_exporter
    inputs: [metrics]
    address: 0.0.0.0:9598
