data_dir: /var/lib/vector

sources:
  in:
    type: http_server
    address: 0.0.0.0:8080
    decoding:
      codec: json
    acknowledgements:
      enabled: true

  metrics:
    type: internal_metrics
    scrape_interval_secs: 1

sinks:
  out:
    type: vector
    inputs: [in]
    address: "tail:6000"
    compression: none
    # Cap the batch so a single pushed EventArray can never exceed tail's per-record limit. The
    # scenario shrinks disk_v2's data-file size (VECTOR_DISK_V2_MAX_DATA_FILE_SIZE, forcing constant
    # file rotation), which also pins max_record_size to that same value (2MiB). The vector sink's
    # default batch is 1000 events with no byte cap, so a backlog flush of large payloads (the
    # harness emits up to 768KiB) can produce an array whose encoded record exceeds 2MiB. Tail then
    # hits an unrecoverable "failed to encode record: BufferTooSmall" on write and the whole process
    # exits. Bounding the batch to 1MiB keeps every record storable while preserving tiny-file
    # rotation. A lone event larger than this still ships (a batch always takes at least one item),
    # but the largest single payload (768KiB) stays under the 2MiB record limit.
    batch:
      max_bytes: 1048576 # 1MiB
    buffer:
      type: disk
      max_size: 268435456 # DIAGNOSTIC: 256MiB (>= 2x the 64MiB data-file size) so files never roll; was 8MiB
      when_full: block
    acknowledgements:
      enabled: true
    # Tuned for Antithesis fault testing. Vector's default 60s request timeout means a send stuck
    # on a connection broken by a network partition is not abandoned -- and so not retried against
    # the healed network -- for up to 60s. That is far longer than the eventually-phase
    # conservation drain window (it gives up after ~15s of no delivery progress), so an event still
    # legitimately in-flight gets reported as lost even though it is safe on disk. A short request
    # timeout plus a short (but non-zero) retry backoff, keeping the default unbounded retry
    # attempts, keeps delivery at-least-once (records are never dropped) while recovering from a
    # fault within a few seconds -- faster than the harness's patience.
    request:
      timeout_secs: 5
      retry_max_duration_secs: 1

  prom:
    type: prometheus_exporter
    inputs: [metrics]
    address: 0.0.0.0:9598
